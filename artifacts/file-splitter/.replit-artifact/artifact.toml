kind = "web"
previewPath = "/"
title = "FileSplit - Dosya Paylaşım Sistemi"
version = "1.0.0"
id = "artifacts/file-splitter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25417

[services.development]
run = "pnpm --filter @workspace/file-splitter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/file-splitter", "run", "build" ]
publicDir = "artifacts/file-splitter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25417"
BASE_PATH = "/"
