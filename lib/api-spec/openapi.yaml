openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: files
    description: File operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List all uploaded files
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileInfo"

  /files/{fileId}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file metadata
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file and all its chunks
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files/{fileId}/snippet:
    get:
      operationId: getFileSnippet
      tags: [files]
      summary: Get the JS embed snippet for a file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JS snippet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnippetResponse"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files/{fileId}/chunks/{chunkIndex}:
    get:
      operationId: downloadChunk
      tags: [files]
      summary: Download a specific chunk of a file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: chunkIndex
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Binary chunk data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Chunk not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FileInfo:
      type: object
      required: [id, name, size, mimeType, chunkCount, chunkSize, uploadedAt, chunkUrls]
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        mimeType:
          type: string
        chunkCount:
          type: integer
        chunkSize:
          type: integer
        uploadedAt:
          type: string
        chunkUrls:
          type: array
          items:
            type: string

    SnippetResponse:
      type: object
      required: [fileId, snippet]
      properties:
        fileId:
          type: string
        snippet:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
